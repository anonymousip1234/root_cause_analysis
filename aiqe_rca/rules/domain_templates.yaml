# AIQE Phase 2 — Domain Templates for Manufacturing RCA
# Each template represents a known failure pattern category.
# The hypothesis builder matches evidence + problem statement against these templates.

templates:
  - id: TMPL_SURFACE_PREP
    name: "Upstream Surface / Adhesive Condition Variation"
    description: "Failure related to inadequate or inconsistent upstream surface condition, adhesive condition, or pre-bond preparation before bonding, coating, or assembly."
    selection_bias: 1.0
    keywords:
      - surface
      - contamination
      - cleaning
      - wipe
      - prep
      - preparation
      - residue
      - degreasing
      - degrease
      - solvent
      - cleanliness
      - adhesion
      - bond failure
      - blistering
      - wet-out
      - primer
      - phosphate
      - adhesive
      - bond lift
      - manual wipe
      - surface condition
      - ATP
      - swab
    aliases:
      - surface condition
      - upstream condition
      - adhesive condition
      - manual wipe
      - bond lift
    typical_evidence_categories:
      - PC  # Process control
      - DA  # Detection/audit
    amplifier_conditions:
      - "extended dwell time between prep and next step"
      - "high humidity during storage"
      - "inconsistent operator practice"
    support_indicators:
      - manual wipe step
      - residual contamination
      - skipping the manual wipe step
      - surface cleaning
      - bond lift
      - adhesive containers were observed open
    weakening_indicators: []

  - id: TMPL_PROCESS_PARAM
    name: "Process Parameter Variation"
    description: "Failure related to variation in key process parameters such as temperature, pressure, time, or speed."
    selection_bias: -0.25
    keywords:
      - cure
      - temperature
      - temp
      - pressure
      - time
      - cycle
      - oven
      - bake
      - dwell
      - speed
      - feed rate
      - parameter
      - setpoint
      - SPC
      - out of control
      - out of spec
      - variation
      - shift
      - drift
      - profile
    aliases:
      - cure temperature
      - cure time
      - molding parameters
      - process shift
      - stable process parameters
    typical_evidence_categories:
      - PV  # Performance/variation
      - PC  # Process control
    amplifier_conditions:
      - "no SPC monitoring on critical parameter"
      - "manual parameter entry"
    support_indicators:
      - out of control
      - out of spec
      - drift
    weakening_indicators:
      - some lots passed with no defects
      - adjacent lots in time sequence
    contradicting_indicators:
      - no recorded changes to cure time or cure temperature
      - no consistent shift in cure temperature or time
      - spc data for cure temperature and cure time remain in control
      - no process shifts detected
      - stable molding parameters
      - spc on cure temp and cure time
      - automated press controls

  - id: TMPL_MATERIAL_HANDLING
    name: "Environmental Exposure / Storage Conditions"
    description: "Failure related to storage conditions, material exposure, humidity, staging duration, or other environmental amplifiers before molding."
    selection_bias: 0.5
    keywords:
      - storage
      - shelf life
      - shelf-life
      - expiration
      - expired
      - handling
      - staging
      - WIP
      - dock
      - humidity
      - moisture
      - exposure
      - container
      - open container
      - adhesive
      - material
      - lot
      - batch
      - degradation
      - dock
      - door
      - 48h
    aliases:
      - storage conditions
      - staging conditions
      - environmental exposure
      - open dock doors
      - stored longer than 48 hours
    typical_evidence_categories:
      - PC  # Process control
      - RC  # Response/corrective
    amplifier_conditions:
      - "proximity to environmental exposure (dock doors, outdoor staging)"
      - "missing shelf-life tracking"
    support_indicators:
      - stored longer than 48 hours
      - open dock doors
      - exposure limit
      - left open past exposure time
      - humidity
      - staging
    weakening_indicators: []

  - id: TMPL_EQUIPMENT_CONDITION
    name: "Equipment / Press-Tool Variation"
    description: "Failure related to equipment degradation, vibration, wear, or maintenance gaps."
    selection_bias: -0.5
    keywords:
      - machine
      - equipment
      - vibration
      - chatter
      - maintenance
      - downtime
      - press
      - cavity
      - tool
      - tooling
      - tool change
      - tool wear
      - spindle
      - fixture
      - alignment
      - calibration
      - bearing
      - mechanical
      - malfunction
    aliases:
      - press variation
      - tool variation
      - cavity correlation
      - mechanical wear
    typical_evidence_categories:
      - PV  # Performance/variation
      - DA  # Detection/audit
    amplifier_conditions:
      - "reactive maintenance only"
      - "missing preventive maintenance records"
      - "operator-reported symptoms ignored"
    support_indicators:
      - press malfunction
      - vibration
      - tool wear
      - cavity-specific
    weakening_indicators:
      - some lots passed with no defects
    contradicting_indicators:
      - no clear correlation to cavity, press, or batch
      - no single press or cavity correlation
      - multi-tool occurrence
      - across multiple tools

  - id: TMPL_HUMAN_DISCIPLINE
    name: "Human / Procedural Discipline"
    description: "Failure related to operator non-compliance, training gaps, or shift-specific discipline issues."
    selection_bias: -1.5
    keywords:
      - operator
      - shift
      - 2nd shift
      - second shift
      - training
      - compliance
      - non-compliance
      - skipping
      - skipped
      - manual
      - discipline
      - audit
      - finding
      - procedure
      - work instruction
      - busy
      - line
      - human
      - error
    aliases:
      - procedural discipline
      - operator practice
    typical_evidence_categories:
      - DA  # Detection/audit
      - PC  # Process control
    amplifier_conditions:
      - "high production volume periods"
      - "understaffing"
    support_indicators:
      - skipping the manual wipe step
      - non-compliance
      - work instruction not followed
    weakening_indicators: []

  - id: TMPL_ENVIRONMENTAL
    name: "Environmental Exposure"
    description: "Failure related to environmental conditions such as humidity, temperature, or contaminant exposure during processing or storage."
    selection_bias: 0.0
    keywords:
      - humidity
      - temperature
      - environment
      - environmental
      - ambient
      - weather
      - seasonal
      - dock
      - outdoor
      - moisture
      - condensation
      - climate
      - salt spray
      - corrosion
      - underbody
    aliases:
      - humidity exposure
      - ambient conditions
    typical_evidence_categories:
      - PV  # Performance/variation
    amplifier_conditions:
      - "no environmental monitoring"
      - "open facility areas"
    support_indicators:
      - humidity
      - condensation
      - open dock doors
    weakening_indicators: []

  - id: TMPL_DESIGN_GEOMETRY
    name: "Adhesive Coverage Variability at Geometry-Challenged Regions"
    description: "Failure related to geometry-driven difficulty in achieving or verifying uniform adhesive coverage at edges, corners, or other high-risk regions."
    selection_bias: 0.75
    keywords:
      - geometry
      - edge
      - corner
      - sharp
      - weld
      - complex
      - coverage
      - adhesive coverage
      - spray coverage
      - thickness gauge
      - verify
      - thin
      - thick
      - tolerance
      - design
      - drawing
      - DFMEA
      - specification
      - critical
      - dimension
      - bore
      - machined
    aliases:
      - geometry-challenged
      - hardest to verify
      - coverage verification
    typical_evidence_categories:
      - DR  # Design/requirements
    amplifier_conditions:
      - "no design-for-manufacturing review"
      - "tight tolerances without capability study"
    support_indicators:
      - geometry-challenged
      - difficult to verify
      - no thickness gauge
      - hardest to verify
      - edges
      - corners
    weakening_indicators: []

  - id: TMPL_DETECTION_GAP
    name: "Detection / Inspection Gap"
    description: "Failure escapes due to inadequate or infrequent inspection, sampling, or detection methods."
    selection_bias: -0.75
    keywords:
      - inspection
      - detection
      - sampling
      - frequency
      - visual
      - leak test
      - measurement
      - gauge
      - CMM
      - control plan
      - PFMEA
      - risk
      - severity
      - occurrence
      - escape
      - customer
      - return
      - complaint
      - field failure
    aliases:
      - coverage verification limitation
      - visual-only detection
    typical_evidence_categories:
      - DA  # Detection/audit
      - DR  # Design/requirements
    amplifier_conditions:
      - "low sampling frequency"
      - "visual-only detection for critical characteristics"
    support_indicators:
      - no thickness gauge
      - visual inspection
      - leak test sensitivity
    weakening_indicators: []
